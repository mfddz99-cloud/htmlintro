<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .background {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1a1a1a;
        }
        .background img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            opacity: 0.9;
        }
        .flip-card {
            position: absolute;
            width: 260px;
            height: 360px;
            perspective: 1000px;
            z-index: 10;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(89, 131, 83, 0.09);
            backdrop-filter: blur(2px);
            border-radius: 1em;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            overflow: hidden;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .flip-card img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="background">
        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20231207160829/glass-bg-2.webp" alt="Glass background">
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="https://media.geeksforgeeks.org/wp-content/uploads/20231207115905/GFG_LOGO-removebg-preview.png" alt="Front side">
                </div>
                <div class="flip-card-back">
                    <img src="https://media.geeksforgeeks.org/wp-content/uploads/20231207115905/GFG_LOGO-removebg-preview.png" alt="Back side">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
