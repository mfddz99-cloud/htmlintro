<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow Creator Registration</title>
    <style>
        body{font-family:Segoe UI,Arial,Helvetica,sans-serif;margin:24px;line-height:1.6;background:#f4f7fb;color:#111}
        header,h1,h2{margin-bottom:12px}
        form{max-width:760px;background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 12px rgba(0,0,0,.08)}
        fieldset{border:1px solid #c2d1df;border-radius:6px;margin-bottom:18px;padding:16px}
        legend{font-weight:700;padding:0 8px}
        .form-group{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:14px}
        label{font-weight:600}
        input,select,textarea{padding:10px;border:1px solid #abb8c8;border-radius:4px;font:inherit}
        .checkbox-group{display:grid;gap:8px;margin-top:8px}
        .media{margin-bottom:20px}
        .form-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
        button{padding:10px 18px;border:none;border-radius:5px;font-weight:700;cursor:pointer}
        button[type="submit"]{background:#0066cc;color:#fff}
        button[type="reset"]{background:#e1e7f2;color:#111}
    </style>
</head>
<body>
    <header>
        <h1>Join the CineFlow Creator Program</h1>
        <p>Create your new content creator account with a short registration form, promotional video, and helpful audio guide.</p>
    </header>

    <main>
        <section id="promo" class="media">
            <h2>Welcome Video</h2>
            <video controls poster="poster.jpg" width="720">
                <source src="promo.mp4" type="video/mp4">
                <source src="promo.webm" type="video/webm">
                Your browser does not support HTML5 video.
            </video>
            <audio controls>
                <source src="tips.mp3" type="audio/mpeg">
                <source src="tips.ogg" type="audio/ogg">
                Your browser does not support HTML5 audio.
            </audio>
        </section>

        <section id="registration">
            <form action="/submit-registration" method="POST" enctype="multipart/form-data">
                <fieldset>
                    <legend>Personal Information</legend>
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" name="fullName" placeholder="e.g., Jordan Smith" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="e.g., CineJordan" pattern="^[A-Za-z0-9]+$" title="Only letters and numbers, no spaces" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="e.g., john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" minlength="8" placeholder="At least 8 characters" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">Date of Birth</label>
                        <input type="date" id="birthdate" name="birthdate" max="2008-06-24" required>
                    </div>
                    <div class="form-group">
                        <label for="profile-picture">Profile Picture</label>
                        <input type="file" id="profile-picture" name="profilePicture" accept="image/jpeg, image/png" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Channel Details</legend>
                    <div class="form-group">
                        <label for="upload-volume">Expected Weekly Upload Volume</label>
                        <input type="range" id="upload-volume" name="uploadVolume" min="0" max="10" step="1">
                        <small>Choose between 0 and 10 videos per week.</small>
                    </div>
                    <div class="form-group">
                        <p>Content Genres</p>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="genres" value="tech" required> Tech</label>
                            <label><input type="checkbox" name="genres" value="lifestyle" required> Lifestyle</label>
                            <label><input type="checkbox" name="genres" value="gaming" required> Gaming</label>
                            <label><input type="checkbox" name="genres" value="education"> Education</label>
                        </div>
                        <small>Select at least one genre.</small>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="submit">Register Account</button>
                    <button type="reset">Clear Form</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
