<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGadget Price Matrix</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 60rem;
            margin: 0 auto;
            padding: 2em;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5em;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5em;
        }

        article {
            flex: 1 1 45%;
            background: white;
            padding: 1.5em;
            border: 1px solid #d1d5db;
            border-radius: 1em;
        }

        article:first-of-type {
            border: 3px solid gold;
        }

        .price-tag {
            margin: 1em 0;
            font-size: 1.2em;
            font-weight: bold;
        }

        .price-tag > span {
            color: #2563eb;
        }

        h2 + p {
            font-style: italic;
            color: #6b7280;
        }

        button {
            padding: 0.7em 1em;
            border: none;
            border-radius: 0.5em;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .features {
            margin-top: 2em;
            padding-left: 1.2em;
        }

        .features li:nth-child(even) {
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>TechGadget Comparison</h1>

        <div class="grid">
            <article>
                <h2>Standard Model</h2>
                <div>Perfect for daily use.</div>
                <div class="price-tag">
                    <span>$</span> 99
                    <div>Includes free shipping</div>
                </div>
                <button>Buy Now</button>
            </article>

            <article>
                <h2>Pro Model</h2>
                <div>For the power users.</div>
                <div class="price-tag">
                    <span>$</span> 199
                </div>
                <button>Buy Now</button>
            </article>
        </div>

        <ul class="features">
            <li>OLED Display</li>
            <li>12-hour Battery</li>
            <li>Water Resistant</li>
            <li>5G Enabled</li>
        </ul>
    </main>
</body>
</html>
